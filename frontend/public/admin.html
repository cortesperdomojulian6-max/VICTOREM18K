<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Panel de administración de Victorem para gestionar usuarios, pedidos y catálogo.">
  <meta name="keywords" content="admin Victorem, gestión usuarios, panel administración joyería">
  <meta name="author" content="Victorem">
  <meta name="robots" content="noindex, nofollow">

  <style>
    body{font-family:Arial,Helvetica,sans-serif;padding:20px}
    .admin-content{max-width:1000px;margin:40px auto;padding:0 20px}
    table{width:100%;border-collapse:collapse;margin-top:20px}
    th,td{padding:8px;border:1px solid #ddd;text-align:left}
    th{background:#f4f4f4}
    button{padding:6px 10px}
    h1{color:var(--color-primary,#b8860b)}

  <div id="header-root"></div>

    <h1>Administrar usuarios</h1>

    <div id="status"></div>
    <table id="users-table">
      <thead>
        <tr><th>ID</th><th>Nombre</th><th>Email</th><th>Fecha registro</th><th>Acciones</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
  <script src="/assets/js/services/api.js"></script>
  <script src="/assets/js/services/auth.js"></script>
  <script src="/assets/js/services/wompi-client.js"></script>
  <script src="/assets/js/components/header-loader.js"></script>
  <script src="/assets/js/pages/admin.js"></script>
  <div id="footer-root"></div>
