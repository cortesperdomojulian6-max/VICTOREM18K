<!-- Modales de autenticación compartidos -->
<div id="loginModal" class="auth-modal" style="display: none;">
  <div class="auth-form">
    <h2>Iniciar Sesión</h2>
    <div id="loginError" class="error-message"></div>
    <div id="loginSuccess" class="success-message"></div>
    <form id="loginForm">
      <div class="form-group">
        <label for="loginEmail">Correo Electrónico</label>
        <input type="email" id="loginEmail" name="email" required>
      </div>
      <div class="form-group">
        <label for="loginPassword">Contraseña</label>
        <input type="password" id="loginPassword" name="password" required>
      </div>
      <button type="submit" class="auth-btn">Iniciar Sesión</button>
    </form>
    <div class="auth-switch">
      ¿No tienes una cuenta? <a href="#" id="showRegister">Regístrate aquí</a>
    </div>
    <button type="button" id="closeLogin" class="modal-close-btn">×</button>
  </div>
</div>

<div id="registerModal" class="auth-modal" style="display: none;">
  <div class="auth-form">
    <h2>Crear Cuenta</h2>
    <div id="registerError" class="error-message"></div>
    <div id="registerSuccess" class="success-message"></div>
    <form id="registerForm">
      <div class="form-group">
        <label for="registerName">Nombre Completo</label>
        <input type="text" id="registerName" name="name" required>
      </div>
      <div class="form-group">
        <label for="registerEmail">Correo Electrónico</label>
        <input type="email" id="registerEmail" name="email" required>
      </div>
      <div class="form-group">
        <label for="registerPassword">Contraseña</label>
        <input type="password" id="registerPassword" name="password" required minlength="6">
      </div>
      <div class="form-group">
        <label for="registerConfirmPassword">Confirmar Contraseña</label>
        <input type="password" id="registerConfirmPassword" name="confirmPassword" required>
      </div>
      <button type="submit" class="auth-btn">Registrarse</button>
    </form>
    <div class="auth-switch">
      ¿Ya tienes una cuenta? <a href="#" id="showLogin">Inicia sesión aquí</a>
    </div>
    <button type="button" id="closeRegister" class="modal-close-btn">×</button>
  </div>
</div>
